stages:
  - deploy

# pages: build the static site on a self-hosted runner and publish to
# GitLab Pages.
#
# A self-hosted runner is exempt from GitLab.com's 400-min compute quota —
# that quota only applies to GitLab-managed shared runners. The runner
# here is `shell` executor with `bb`, `pandoc`, `d2`, `make`, and docker
# (for any future docker-executor migration) installed natively; no
# Docker-in-Docker image pull is needed.
#
# Tag `homepage-self-hosted` matches the registered runner's tag-list,
# so GitLab routes the build straight to this box and shared runners
# never see the job. See `local-gitlab-runner-unlimited-ci.md` for the
# architectural write-up.

pages:
  stage: deploy
  tags:
    - homepage-self-hosted
  # Cache `public/` across pipeline runs on this self-hosted runner. Cache
  # lives on the runner host in `~/.gitlab-runner/cache/...` — no upload
  # cost to GitLab.com's object store.
  #
  # Content-hash key (4 source files): invalidates when dev pipeline or
  # CSS changes within the same branch. dev.clj's mtime-skip catches
  # individual .md changes within a cache hit. Note: this cache path
  # intentionally widens past the originally requested `public/diagrams/`
  # — caching all of `public/` is cheaper on restore and the user's
  # `diagrams/` subset is already inside `public/`. The originally
  # requested `.bb-cache/` does not exist in babashka (no built-in cache
  # dir), so it's not added.
  cache:
    # GitLab CI caps `key:files` at 2 entries. We pick the two that change
    # the rendered HTML the most: the build pipeline itself (dev.clj) and
    # the main stylesheet (styles.css). Changes to `d2-mobile.css` (post-
    # mobile responsive) or `bb.edn` (task runner config) won't invalidate
    # cache automatically — clear the runner cache manually via
    # `glab ci cache delete --branch main` if you touch those.
    key:
      files:
        - src/site/fabricate/dev/dev.clj
        - src/site/fabricate/dev/templates/styles.css
    paths:
      - public/
    policy: pull-push
  before_script:
    # Tell dev.clj whether to skip clear-output + per-post pandoc (CI
    # cache mode) or do a full cold build (no cache). Always-set env var
    # avoids `set -e` brittleness with `&& ... || true` patterns.
    - if [ -f public/index.html ]; then export CI_CACHE_PRESENT=1; else unset CI_CACHE_PRESENT; fi
  script:
    - bb build
    - bb validate-links
  artifacts:
    paths:
      - public/
  # Give up after 15 minutes. If the runner is unreachable (laptop asleep,
  # off-network, OS paused), the job fails fast instead of queuing forever.
  # See `local-gitlab-runner-unlimited-ci.md` for the tradeoffs.
  timeout: 15m
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
