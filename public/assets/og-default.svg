<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b0f19"/>
      <stop offset="100%" stop-color="#1a1f2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g stroke="#1e293b" stroke-width="0.5" opacity="0.3">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- Subtle network nodes left side -->
  <g opacity="0.15">
    <circle cx="120" cy="200" r="4" fill="#38bdf8"/>
    <circle cx="280" cy="160" r="3" fill="#38bdf8"/>
    <circle cx="200" cy="320" r="5" fill="#38bdf8"/>
    <circle cx="340" cy="280" r="3" fill="#38bdf8"/>
    <circle cx="80" cy="400" r="3" fill="#38bdf8"/>
    <circle cx="260" cy="440" r="4" fill="#38bdf8"/>
    <circle cx="160" cy="480" r="2" fill="#38bdf8"/>
    <line x1="120" y1="200" x2="280" y2="160" stroke="#38bdf8" stroke-width="0.5"/>
    <line x1="120" y1="200" x2="200" y2="320" stroke="#38bdf8" stroke-width="0.5"/>
    <line x1="280" y1="160" x2="340" y2="280" stroke="#38bdf8" stroke-width="0.5"/>
    <line x1="200" y1="320" x2="340" y2="280" stroke="#38bdf8" stroke-width="0.5"/>
    <line x1="80" y1="400" x2="200" y2="320" stroke="#38bdf8" stroke-width="0.5"/>
    <line x1="80" y1="400" x2="260" y2="440" stroke="#38bdf8" stroke-width="0.5"/>
    <line x1="260" y1="440" x2="200" y2="320" stroke="#38bdf8" stroke-width="0.5"/>
    <line x1="260" y1="440" x2="160" y2="480" stroke="#38bdf8" stroke-width="0.5"/>
    <line x1="200" y1="320" x2="160" y2="480" stroke="#38bdf8" stroke-width="0.5"/>
  </g>

  <!-- Accent line -->
  <rect x="80" y="240" width="60" height="4" rx="2" fill="url(#accent)"/>

  <!-- Main title -->
  <text x="80" y="300" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="52" font-weight="800" fill="#ffffff" letter-spacing="-1">Nur Azhar's Blog</text>

  <!-- Subtitle -->
  <text x="80" y="350" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="22" font-weight="400" fill="#94a3b8" letter-spacing="0">Bitcoin, AI Agents, Protocol Engineering</text>

  <!-- Tagline -->
  <text x="80" y="400" font-family="Menlo, Monaco, 'Courier New', monospace" font-size="14" fill="#64748b">$ cat /dev/blockchain | grep wisdom</text>

  <!-- Bottom bar -->
  <rect x="80" y="560" width="300" height="1" fill="#334155"/>
  <text x="80" y="585" font-family="Menlo, Monaco, 'Courier New', monospace" font-size="12" fill="#475569">blog.nurazhar.com</text>
</svg>
