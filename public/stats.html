    <script>
      (function() {
        try {
          const savedTheme = localStorage.getItem('theme');
          const systemPrefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
          const theme = savedTheme || (systemPrefersDark ? 'dark' : 'light');
          document.documentElement.setAttribute('data-theme', theme);
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'light');
        }
      })();
    </script>

          div.textContent = codeBlock.textContent;

<script>
  (function() {
    const API_URL = 'https://asia-southeast1-nurazhardotcom.cloudfunctions.net/blog-analytics-api/stats';
    const countriesList = document.getElementById('countries-list');
    loadStats();

    async function loadStats() {
      try {
        const res = await fetch(API_URL);
        if (!res.ok) throw new Error('Failed to fetch analytics');
        const data = await res.json();
        renderCountries(data);
      } catch (err) {
        console.error('Analytics loading failed:', err);
      }
    }

    function renderCountries(data) {
      if (!data.countries || data.countries.length === 0) {
        countriesList.innerHTML = '<p style="color: var(--text-color); opacity: 0.5; text-align: center;">No data yet</p>';
        return;
      }
      const maxViews = Math.max(...data.countries.map(c => parseInt(c.views, 10)));
      countriesList.innerHTML = data.countries.map(c => {
        const views = parseInt(c.views, 10);
        const pct = (views / maxViews) * 100;
        return `
          <div style="margin-bottom: 12px; color: var(--text-color);">
            <div style="display: flex; justify-content: space-between; font-size: 0.9rem; margin-bottom: 4px;">
              <span style="font-weight: 500;">${escapeHtml(c.country)}</span>
              <span>${views.toLocaleString()}</span>
            </div>
            <div style="width: 100%; height: 8px; background: var(--code-border); border-radius: 4px; overflow: hidden;">
              <div style="width: ${pct}%; height: 100%; background: var(--link-color); border-radius: 4px;"></div>
            </div>
          </div>
        `;
      }).join('');
    }

    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }
  })();
</script>

    <script>
      document.addEventListener('DOMContentLoaded', () => {
        const toggleButton = document.getElementById('theme-toggle');
        if (toggleButton) {
          const currentTheme = document.documentElement.getAttribute('data-theme') || 'light';
          toggleButton.textContent = currentTheme === 'dark' ? '☀️' : '🌙';
          
          toggleButton.addEventListener('click', () => {
            const current = document.documentElement.getAttribute('data-theme') || 'light';
            const next = current === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', next);
            try {
              localStorage.setItem('theme', next);
            } catch (e) {
              console.warn('Storage blocked: theme preference will not persist.');
            }
            toggleButton.textContent = next === 'dark' ? '☀️' : '🌙';
          });
        }
      });
    </script>
    <script>
      (function() {
        if (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') return;
        
        fetch('https://asia-southeast1-nurazhardotcom.cloudfunctions.net/blog-analytics-api/track', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            path: window.location.pathname,
            referrer: document.referrer || null
          })
        }).catch(err => console.error('Tracking failed', err));
      })();
